name: Publish Rust Crates

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: crates-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate crates for release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Dry-run mstlo-macros publish
        run: cargo publish --manifest-path mstlo/mstlo-macros/Cargo.toml --locked --dry-run

      - name: Validate mstlo crate metadata and buildability
        run: |
          cargo metadata --manifest-path mstlo/Cargo.toml --format-version 1 > /dev/null
          cargo check --manifest-path mstlo/Cargo.toml --locked

      - name: Dry-run mstlo publish
        run: cargo publish --manifest-path mstlo/Cargo.toml --locked --dry-run

  publish-macros:
    name: Publish mstlo-macros
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: [validate-release]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish mstlo-macros to crates.io
        run: cargo publish --manifest-path mstlo/mstlo-macros/Cargo.toml --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  publish-mstlo:
    name: Publish mstlo
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: [publish-macros]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Wait for mstlo-macros index propagation
        shell: bash
        run: |
          set -euo pipefail

          macros_version=$(awk -F '"' '/^version = / { print $2; exit }' mstlo/mstlo-macros/Cargo.toml)
          if [[ -z "${macros_version}" ]]; then
            echo "Could not determine mstlo-macros version from Cargo.toml"
            exit 1
          fi

          max_attempts=20
          sleep_seconds=15

          for attempt in $(seq 1 "$max_attempts"); do
            if cargo search mstlo-macros --limit 1 | grep -E "^mstlo-macros = \"${macros_version}\""; then
              echo "mstlo-macros ${macros_version} is visible on crates.io."
              exit 0
            fi

            echo "Attempt ${attempt}/${max_attempts}: mstlo-macros ${macros_version} not visible yet."
            sleep "$sleep_seconds"
          done

          echo "Timed out waiting for mstlo-macros to propagate on crates.io."
          exit 1

      - name: Publish mstlo to crates.io
        run: cargo publish --manifest-path mstlo/Cargo.toml --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
