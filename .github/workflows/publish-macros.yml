name: Publish mstlo-macros

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-macros:
    name: Publish mstlo-macros
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --manifest-path mstlo/mstlo-macros/Cargo.toml --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
